services:
  yacy:
    image: yacy/yacy_search_server:latest
    container_name: yacy
    volumes:
      - /data/agi/yacy:/opt/yacy/DATA/
    ports:
      - 8090:8090
    environment:
      - YACY_HOST=0.0.0.0
    extra_hosts:
      - host.docker.internal:host-gateway
    restart: unless-stopped
    networks:
      - agi-net
  embd:
    image: guojingneo/agi-fastapi-embd:f89017a-
    container_name: embd
    volumes:
      - /data/agi:/agi/cache
      - /data/model:/agi/models
    runtime: nvidia
    ports:
      - 8006:8006
    env_file: "docker-compose.env"
    extra_hosts:
      - host.docker.internal:host-gateway
    restart: unless-stopped
    networks:
      - agi-net
  huggingface:
    image: guojingneo/agi-fastapi-hf:f89017a-
    container_name: huggingface
    volumes:
      - /data/agi:/agi/cache
      - /data/model:/agi/models
    runtime: nvidia
    ports:
      - 8005:8005
    env_file: "docker-compose.env"
    extra_hosts:
      - host.docker.internal:host-gateway
    restart: unless-stopped
    networks:
      - agi-net
      
  whisper:
    image: guojingneo/agi-fastapi-whisper:d6ac6b0-dev
    container_name: whisper
    volumes:
      - /data/agi:/agi/cache
      - /data/model:/agi/models
    runtime: nvidia
    ports:
      - 8003:8003
    env_file: "docker-compose.env"
    extra_hosts:
      - host.docker.internal:host-gateway
    restart: unless-stopped
    networks:
      - agi-net

  image_gen:
    image: guojingneo/agi-fastapi-image:d6ac6b0-dev
    container_name: image_gen
    volumes:
      - /data/agi:/agi/cache
      - /data/model:/agi/models
    runtime: nvidia
    ports:
      - 8001:8001
    env_file: "docker-compose.env"
    extra_hosts:
      - host.docker.internal:host-gateway
    restart: unless-stopped
    networks:
      - agi-net
  
  tts:
    image: guojingneo/agi-fastapi-tts:d6ac6b0-dev
    container_name: tts
    volumes:
      - /data/agi:/agi/cache
      - /data/model:/agi/models
    runtime: nvidia
    ports:
      - 8002:8002
    env_file: "docker-compose.env"
    extra_hosts:
      - host.docker.internal:host-gateway
    restart: unless-stopped
    networks:
      - agi-net
    
  agi:
    image: guojingneo/agi-fastapi-app:d6ac6b0-dev
    container_name: agi
    volumes:
      - /data/agi:/agi/cache
      - /data/model:/agi/models
    ports:
      - 8000:8000
    depends_on:
      - tts
      - image_gen
      - whisper
      - huggingface
      - embd
      - yacy
    env_file: "docker-compose.env"
    extra_hosts:
      - host.docker.internal:host-gateway
    restart: unless-stopped
    networks:
      - agi-net

  open-webui:
    image: ghcr.io/neoguojing/open-webui:main-cuda
    container_name: open-webui
    volumes:
      - /data/webui:/app/backend/data
      - ${HOME}/.cache:/root/.cache
    depends_on:
      - agi
    ports:
      - 3000:8080
    environment:
      - 'OLLAMA_BASE_URL=http://host.docker.internal:11434'
      - 'WEBUI_SECRET_KEY='
      - 'AGI_BASE_URL=http://agi:8000/v1'
      - 'AGI_API_KEY=123'

    extra_hosts:
      - host.docker.internal:host-gateway
    restart: unless-stopped
    networks:
      - agi-net

networks:
  agi-net:
    driver: bridge
